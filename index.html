<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Letterle</title>
	<style>
		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: Arial, sans-serif;
			background: #121213;
			color: white;
			display: flex;
			justify-content: center;
			align-items: center;
			min-height: 100vh;
		}

		.game {
			width: min(420px, 92vw);
			text-align: center;
			padding: 24px;
		}

		h1 {
			margin: 0 0 8px;
			font-size: 42px;
			letter-spacing: 2px;
		}

		.subtitle {
			margin: 0 0 24px;
			color: #b3b3b3;
		}

		.board {
			display: grid;
			grid-template-columns: repeat(5, 64px);
			gap: 10px;
			justify-content: center;
			margin-bottom: 22px;
		}

		.tile {
			width: 64px;
			height: 64px;
			border: 2px solid #3a3a3c;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 34px;
			font-weight: bold;
			text-transform: uppercase;
			transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease;
		}

		.tile.filled {
			border-color: #565758;
			animation: pop 0.12s ease;
		}

		.tile.correct {
			background: #538d4e;
			border-color: #538d4e;
		}

		.tile.wrong {
			background: #3a3a3c;
			border-color: #3a3a3c;
		}

		@keyframes pop {
			50% {
				transform: scale(1.08);
			}
		}

		.message {
			min-height: 28px;
			margin-bottom: 18px;
			font-weight: bold;
		}

		.keyboard {
			display: flex;
			flex-wrap: wrap;
			justify-content: center;
			gap: 6px;
			margin-bottom: 18px;
		}

		.key {
			border: none;
			border-radius: 5px;
			background: #818384;
			color: white;
			font-size: 15px;
			font-weight: bold;
			width: 36px;
			height: 48px;
			cursor: pointer;
		}

		.key:hover {
			filter: brightness(1.12);
		}

		.key.correct {
			background: #538d4e;
		}

		.key.wrong {
			background: #3a3a3c;
		}

		.controls {
			display: flex;
			justify-content: center;
			gap: 10px;
		}

		button.action {
			border: 1px solid #565758;
			border-radius: 6px;
			background: transparent;
			color: white;
			padding: 10px 14px;
			cursor: pointer;
			font-weight: bold;
		}

		button.action:hover {
			background: #2a2a2c;
		}
	</style>
</head>
<body>
	<main class="game">
		<h1>Letterle</h1>
		<p class="subtitle">Guess the secret letter in 5 tries.</p>

		<div class="board" id="board"></div>
		<div class="message" id="message">Type or tap a letter.</div>
		<div class="keyboard" id="keyboard"></div>

		<div class="controls">
			<button class="action" onclick="newGame()">New Game</button>
			<button class="action" onclick="showAnswer()">Show Answer</button>
		</div>
	</main>

	<script>
		const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
		const maxGuesses = 5;
		let answer = "";
		let guessNumber = 0;
		let gameOver = false;

		const board = document.getElementById("board");
		const keyboard = document.getElementById("keyboard");
		const message = document.getElementById("message");

		function buildBoard() {
			board.innerHTML = "";

			for (let i = 0; i < maxGuesses; i++) {
				const tile = document.createElement("div");
				tile.className = "tile";
				tile.id = "tile-" + i;
				board.appendChild(tile);
			}
		}

		function buildKeyboard() {
			keyboard.innerHTML = "";

			for (let i = 0; i < alphabet.length; i++) {
				const letter = alphabet.charAt(i);
				const key = document.createElement("button");
				key.className = "key";
				key.textContent = letter;
				key.id = "key-" + letter;
				key.onclick = function() {
					makeGuess(letter);
				};
				keyboard.appendChild(key);
			}
		}

		function newGame() {
			answer = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
			guessNumber = 0;
			gameOver = false;
			message.textContent = "Type or tap a letter.";
			buildBoard();
			buildKeyboard();
		}

		function makeGuess(letter) {
			if (gameOver || guessNumber >= maxGuesses) {
				return;
			}

			letter = letter.toUpperCase();

			if (alphabet.indexOf(letter) === -1 || letter.length !== 1) {
				return;
			}

			const tile = document.getElementById("tile-" + guessNumber);
			const key = document.getElementById("key-" + letter);

			tile.textContent = letter;
			tile.classList.add("filled");

			if (letter === answer) {
				tile.classList.add("correct");
				key.classList.add("correct");
				message.textContent = "Correct! The letter was " + answer + ".";
				gameOver = true;
			} else {
				tile.classList.add("wrong");
				key.classList.add("wrong");
				guessNumber++;

				if (guessNumber === maxGuesses) {
					message.textContent = "Out of guesses. The letter was " + answer + ".";
					gameOver = true;
				} else {
					message.textContent = "Nope. Try again.";
				}
			}
		}

		function showAnswer() {
			message.textContent = "The answer is " + answer + ".";
		}

		document.addEventListener("keydown", function(event) {
			makeGuess(event.key);
		});

		newGame();
	</script>
</body>
</html>
